<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Table Setup - A-Frame</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
</head>

<body>
    <a-scene>
        <!-- Assets Management -->
        <a-assets>
            <img id="skyTex" src="images/sky.jpg">
            <img id="groundTex" src="images/part of outside ground.png">
            <img id="groundTextTex" src="images/part of outside ground text.png">
            <img id="roomGround" src="images/room_ground.png">
            <img id="miloLogo" src="images/milo logo.png">
            <img id="milkTex" src="images/milk.jpg">
            <img id="tableTex" src="images/table-texture.png">
            <img id="wallInside" src="images/room wallpaper.jpg">
            <img id="wallOutside" src="images/house outside wall.jpg">
            <img id="ceilingTex" src="images/ceiling.jpg">
        </a-assets>

        <!-- Background & Environment -->
        <a-sky src="#skyTex"></a-sky>

        <!-- Vast Outdoor Environment -->
        <a-entity id="vast-env">
            <!-- Huge Ground -->
            <a-plane position="0 -0.1 0" rotation="-90 0 0" width="400" height="400" src="#groundTex" repeat="80 80" material="roughness: 1"></a-plane>
            <a-plane position="0 -0.09 0" rotation="-90 0 0" width="400" height="400" src="#groundTextTex" repeat="40 40" opacity="0.3" transparent="true"></a-plane>
            
            <!-- Distant Landmarks (Hills) -->
            <a-sphere position="-60 -10 -90" radius="50" color="#3d5e3a" scale="1 0.4 1"></a-sphere>
            <a-sphere position="80 -10 -70" radius="45" color="#4a6b47" scale="1 0.5 1"></a-sphere>
            <a-sphere position="10 -10 -120" radius="60" color="#2e4d2a" scale="1 0.3 1"></a-sphere>
        </a-entity>

        <!-- Outdoor Decor: Forest -->
        <a-entity id="forest">
            <!-- Cluster 1 -->
            <a-entity position="-15 0 -25">
                <a-cylinder radius="0.6" height="6" color="#4B3621"></a-cylinder>
                <a-cone position="0 6 0" radius-bottom="3" height="4" color="#228B22"></a-cone>
            </a-entity>
            <a-entity position="-25 0 -15">
                <a-cylinder radius="0.4" height="4" color="#4B3621"></a-cylinder>
                <a-sphere position="0 4 0" radius="2" color="#2E7D32"></a-sphere>
            </a-entity>
            <a-entity position="-10 0 -35">
                <a-cylinder radius="0.5" height="5" color="#4B3621"></a-cylinder>
                <a-cone position="0 5 0" radius-bottom="2.5" height="3.5" color="#1B5E20"></a-cone>
            </a-entity>
            <!-- Cluster 2 -->
            <a-entity position="20 0 -30">
                <a-cylinder radius="0.7" height="7" color="#4B3621"></a-cylinder>
                <a-cone position="0 7 0" radius-bottom="3.5" height="5" color="#2E7D32"></a-cone>
            </a-entity>
            <a-entity position="35 0 -20">
                <a-cylinder radius="0.5" height="5" color="#4B3621"></a-cylinder>
                <a-sphere position="0 5 0" radius="2.5" color="#388E3C"></a-sphere>
            </a-entity>
            <!-- Background Forest Fill -->
            <a-entity position="0 0 -60">
                <a-cone position="-20 5 0" radius-bottom="4" height="10" color="#1B5E20"></a-cone>
                <a-cone position="20 5 0" radius-bottom="4" height="10" color="#1B5E20"></a-cone>
                <a-cone position="0 5 -10" radius-bottom="5" height="12" color="#0D3B0D"></a-cone>
            </a-entity>
            <!-- Near Trees -->
            <a-entity position="-12 0 20">
                <a-cylinder radius="0.5" height="6" color="#4B3621"></a-cylinder>
                <a-sphere position="0 6 0" radius="3" color="#2E7D32"></a-sphere>
            </a-entity>
            <a-entity position="18 0 15">
                <a-cylinder radius="0.4" height="5" color="#4B3621"></a-cylinder>
                <a-cone position="0 5 0" radius-bottom="2" height="4" color="#228B22"></a-cone>
            </a-entity>
        </a-entity>

        <!-- Room Construction -->
        <!-- Floor -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" src="#roomGround" repeat="2 2"
            material="roughness: 0.9"></a-plane>

        <!-- Walls with Interior/Exterior Textures -->
        <!-- Back Wall -->
        <a-entity position="0 2.5 -5">
            <a-plane position="0 0 0.051" width="10" height="5" src="#wallInside" repeat="2 1"></a-plane> <!-- Inside -->
            <a-plane position="0 0 -0.051" rotation="0 180 0" width="10" height="5" src="#wallOutside" repeat="2 1"></a-plane> <!-- Outside -->
        </a-entity>
        <!-- Left Wall -->
        <a-entity position="-5 2.5 0" rotation="0 90 0">
            <a-plane position="0 0 0.051" width="10" height="5" src="#wallInside" repeat="2 1"></a-plane> <!-- Inside -->
            <a-plane position="0 0 -0.051" rotation="0 180 0" width="10" height="5" src="#wallOutside" repeat="2 1"></a-plane> <!-- Outside -->
        </a-entity>
        <!-- Right Wall -->
        <a-entity position="5 2.5 0" rotation="0 -90 0">
            <a-plane position="0 0 0.051" width="10" height="5" src="#wallInside" repeat="2 1"></a-plane> <!-- Inside -->
            <a-plane position="0 0 -0.051" rotation="0 180 0" width="10" height="5" src="#wallOutside" repeat="2 1"></a-plane> <!-- Outside -->
        </a-entity>
        <!-- Front Wall with Doorway -->
        <a-entity position="0 2.5 5">
            <!-- Left Panel -->
            <a-entity position="-3.5 0 0">
                <a-plane position="0 0 -0.051" rotation="0 180 0" width="3" height="5" src="#wallInside"></a-plane>
                <a-plane position="0 0 0.051" width="3" height="5" src="#wallOutside"></a-plane>
            </a-entity>
            <!-- Right Panel -->
            <a-entity position="3.5 0 0">
                <a-plane position="0 0 -0.051" rotation="0 180 0" width="3" height="5" src="#wallInside"></a-plane>
                <a-plane position="0 0 0.051" width="3" height="5" src="#wallOutside"></a-plane>
            </a-entity>
            <!-- Top Panel -->
            <a-entity position="0 1.5 0">
                <a-plane position="0 0 -0.051" rotation="0 180 0" width="4" height="2" src="#wallInside"></a-plane>
                <a-plane position="0 0 0.051" width="4" height="2" src="#wallOutside"></a-plane>
            </a-entity>
        </a-entity>

        <!-- Ceiling and Fan -->
        <a-entity position="0 5 0">
            <a-box position="0 0.05 0" width="10" height="0.1" depth="10" color="#EEEEEE"></a-box> <!-- Main Roof structure -->
            <a-plane position="0 -0.01 0" rotation="90 0 0" width="10" height="10" src="#ceilingTex" repeat="2 2"></a-plane> <!-- Ceiling texture -->
        </a-entity>
        <a-entity id="ceiling-fan" position="0 4.8 0">
            <a-cylinder radius="0.04" height="0.4" color="#222" position="0 0.2 0"></a-cylinder> <!-- Downrod -->
            <a-cylinder radius="0.25" height="0.1" color="#444"></a-cylinder> <!-- Motor Housing -->
            <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 1500; easing: linear">
                <a-box position="0.8 0 0" width="1.4" height="0.02" depth="0.25" color="#555"></a-box> <!-- Blade 1 -->
                <a-box position="-0.8 0 0" width="1.4" height="0.02" depth="0.25" color="#555"></a-box> <!-- Blade 2 -->
                <a-box position="0 0 0.8" width="0.25" height="0.02" depth="1.4" color="#555"></a-box> <!-- Blade 3 -->
                <a-box position="0 0 -0.8" width="0.25" height="0.02" depth="1.4" color="#555"></a-box> <!-- Blade 4 -->
            </a-entity>
        </a-entity>

        <!-- Enhanced Lighting -->
        <a-entity light="type: ambient; intensity: 0.4"></a-entity>
        <a-entity light="type: point; intensity: 0.8; distance: 15; castShadow: true" position="0 4 0"></a-entity>
        <a-entity light="type: directional; intensity: 0.5" position="-5 10 -5"></a-entity>

        <!-- Table Creation -->
        <!-- Table Top -->
        <a-box id="table-top" position="0 0.8 0" width="2" height="0.1" depth="1.2" src="#tableTex"
            material="roughness: 0.6"></a-box>
        <!-- Table Legs -->
        <a-box position="-0.9 0.4 -0.5" width="0.1" height="0.8" depth="0.1" color="#3B1E08"></a-box>
        <a-box position="0.9 0.4 -0.5" width="0.1" height="0.8" depth="0.1" color="#3B1E08"></a-box>
        <a-box position="-0.9 0.4 0.5" width="0.1" height="0.8" depth="0.1" color="#3B1E08"></a-box>
        <a-box position="0.9 0.4 0.5" width="0.1" height="0.8" depth="0.1" color="#3B1E08"></a-box>

        <!-- Chairs -->
        <!-- Chair 1 -->
        <a-entity id="chair-1" position="0 0 1">
            <a-box position="0 0.45 0" width="0.5" height="0.05" depth="0.5" src="#tableTex"></a-box> <!-- Seat -->
            <a-box position="0 0.75 0.22" width="0.5" height="0.6" depth="0.05" src="#tableTex"></a-box>
            <!-- Backrest -->
            <a-box position="-0.2 0.22 0.2" width="0.05" height="0.45" depth="0.05" color="#3B1E08"></a-box>
            <!-- Legs -->
            <a-box position="0.2 0.22 0.2" width="0.05" height="0.45" depth="0.05" color="#3B1E08"></a-box>
            <a-box position="-0.2 0.22 -0.2" width="0.05" height="0.45" depth="0.05" color="#3B1E08"></a-box>
            <a-box position="0.2 0.22 -0.2" width="0.05" height="0.45" depth="0.05" color="#3B1E08"></a-box>
        </a-entity>

        <!-- Chair 2 -->
        <a-entity id="chair-2" position="0 0 -1" rotation="0 180 0">
            <a-box position="0 0.45 0" width="0.5" height="0.05" depth="0.5" src="#tableTex"></a-box> <!-- Seat -->
            <a-box position="0 0.75 0.22" width="0.5" height="0.6" depth="0.05" src="#tableTex"></a-box>
            <!-- Backrest -->
            <a-box position="-0.2 0.22 0.2" width="0.05" height="0.45" depth="0.05" color="#3B1E08"></a-box>
            <!-- Legs -->
            <a-box position="0.2 0.22 0.2" width="0.05" height="0.45" depth="0.05" color="#3B1E08"></a-box>
            <a-box position="-0.2 0.22 -0.2" width="0.05" height="0.45" depth="0.05" color="#3B1E08"></a-box>
            <a-box position="0.2 0.22 -0.2" width="0.05" height="0.45" depth="0.05" color="#3B1E08"></a-box>
        </a-entity>

        <!-- Milo Tin (Improved wrap) -->
        <a-entity position="-0.5 0.9 0">
            <a-cylinder radius="0.1" height="0.25" color="#006400" material="metalness: 0.8; roughness: 0.2"></a-cylinder> <!-- Body -->
            <a-cylinder radius="0.101" height="0.2" src="#miloLogo" material="repeat: 2 1; transparent: true; metalness: 0.5; roughness: 0.3"></a-cylinder>
            <a-text value="Milo" position="0 0.1 0.105" align="center" width="0.8" color="yellow" font="kelsonsans"></a-text>
        </a-entity>

        <!-- Milk Tin (Improved wrap) -->
        <a-entity position="0.5 0.9 0">
            <a-cylinder radius="0.07" height="0.2" src="#milkTex" material="repeat: 2 1; metalness: 0.7; roughness: 0.3"></a-cylinder>
            <a-text value="Milk" position="0 0 0.075" align="center" width="0.7" color="#00008B" font="kelsonsans"></a-text>
        </a-entity>

        <!-- Cup 1 -->
        <a-entity position="-0.2 0.85 0.2">
            <a-cylinder radius="0.04" height="0.1" color="#FFFFFF" open-ended="true"
                material="side: double"></a-cylinder>
            <a-cylinder radius="0.04" height="0.005" position="0 -0.045 0" color="#FFFFFF"></a-cylinder>
            <!-- Cup base -->
        </a-entity>

        <!-- Cup 2 -->
        <a-entity position="0.2 0.85 0.2">
            <a-cylinder radius="0.04" height="0.1" color="#ADD8E6" open-ended="true"
                material="side: double"></a-cylinder>
            <a-cylinder radius="0.04" height="0.005" position="0 -0.045 0" color="#ADD8E6"></a-cylinder>
            <!-- Cup base -->
        </a-entity>

        <!-- Optional Beautification -->
        <!-- Tablecloth -->
        <a-plane position="0 0.851 0" rotation="-90 0 0" width="1.8" height="1" color="#F0F8FF" opacity="0.6"
            material="side: double"></a-plane>

        <!-- Flower Vase -->
        <a-entity position="0 0.9 0">
            <a-cylinder radius="0.03" height="0.2" color="#FFFFFF" opacity="0.8"
                material="transparent: true"></a-cylinder>
            <a-cylinder position="0 0.15 0" radius="0.005" height="0.2" color="green"></a-cylinder>
            <a-sphere position="0 0.25 0" radius="0.03" color="pink"></a-sphere>
        </a-entity>

        <!-- Closer Camera View -->
        <a-entity position="0 1.4 1.8">
            <a-camera></a-camera>
        </a-entity>
    </a-scene>
</body>

</html>
